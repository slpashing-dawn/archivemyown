<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 작품 아카이브</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --text-main: #e5e5e5;
            --text-muted: #8c8c8c;
            --border: #262626;
            --border-light: #404040;
            --accent: #ffffff;
            --star: #d4af37;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            line-height: 1.5;
            font-weight: 300;
            font-size: 0.9rem; /* 전체적인 기본 폰트 크기 축소 */
        }

        .page-wrapper {
            max-width: 1400px; /* 넓은 화면을 활용하기 위해 최대 폭 확장 */
            margin: 0 auto;
            border: 1px solid var(--border);
            padding: 20px;
        }

        h1 { 
            text-align: center; 
            font-family: 'Cinzel', serif; 
            font-size: 2rem; 
            margin: 0 0 20px 0; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 15px; 
            letter-spacing: 3px;
        }
        
        /* 동적 대시보드 레이아웃 (기본 세로 스택) */
        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 컨트롤 영역 (폼 + 필터) */
        .controls-sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            padding-bottom: 6px;
            margin-bottom: 12px;
            display: block;
            letter-spacing: 1px;
        }

        /* 콤팩트 카드 스타일 */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 15px; /* 내부 여백 축소 */
        }

        .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .form-row > * { flex: 1; min-width: 120px; }
        .form-group { margin-bottom: 10px; }
        
        label { 
            display: block; 
            margin-bottom: 3px; 
            font-size: 0.75rem; 
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input[type="text"], input[type="number"], select, textarea {
            width: 100%;
            padding: 8px 10px; /* 인풋 패딩 축소 */
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.85rem;
            outline: none;
        }

        input:focus, select:focus, textarea:focus { border-color: var(--border-light); }
        select option { background-color: var(--surface); color: var(--text-main); }

        .checkbox-group { display: flex; align-items: center; gap: 8px; margin-top: 22px; cursor: pointer; }
        .checkbox-group input { width: 14px; height: 14px; accent-color: var(--accent); }

        button {
            background-color: var(--accent);
            color: var(--bg);
            border: 1px solid var(--accent);
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            width: 100%;
        }

        button:hover { background-color: transparent; color: var(--accent); }
        
        .btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn-outline { background-color: transparent; color: var(--accent); }
        .btn-outline:hover { background-color: var(--border); }
        .btn-danger { background-color: transparent; color: #ff5555; border-color: #ff5555; }
        .btn-danger:hover { background-color: #ff5555; color: #000; }

        /* 작품 목록 기본 (세로 리스트) */
        .works-container {
            flex: 1;
        }
        
        .works-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 작품 아이템 콤팩트 스타일 */
        .work-item {
            border: 1px solid var(--border);
            padding: 12px 15px;
            background: var(--surface);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: border-color 0.2s;
        }
        .work-item:hover { border-color: var(--border-light); }

        .work-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
        .work-title { font-family: 'Cinzel', serif; font-size: 1.15rem; margin: 0; color: var(--accent); line-height: 1.3; }
        .work-author { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
        
        .rating-fav { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
        .fav-star { color: var(--star); font-size: 0.7rem; border: 1px solid var(--star); padding: 1px 4px; font-weight: bold; }
        .rating-display { color: var(--star); font-size: 0.85rem; letter-spacing: 1px; }

        .review-box { font-size: 0.85rem; margin-bottom: 8px; background: rgba(255,255,255,0.02); padding: 6px 10px; border-left: 1px solid var(--border-light); }
        .review-short { font-weight: 500; color: var(--text-main); }
        .review-long { color: var(--text-muted); font-size: 0.8rem; white-space: pre-wrap; margin-top: 4px; }
        
        .work-link { display: inline-block; font-size: 0.8rem; color: var(--text-muted); text-decoration: underline; margin-bottom: 8px; }
        .work-link:hover { color: var(--accent); }

        .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
        .tags span { border: 1px solid var(--border); color: var(--text-muted); padding: 1px 6px; font-size: 0.75rem; font-family: 'Cinzel', serif; }

        .item-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
        .item-actions button { width: auto; padding: 4px 10px; font-size: 0.75rem; }

        .backup-zone { display: flex; gap: 10px; margin-top: 5px; }
        .backup-zone button { padding: 6px; font-size: 0.8rem; }

        /* 💻 가로가 넓은 화면 (PC, 패드 가로)을 위한 반응형 스타일 전환 */
        @media (min-width: 900px) {
            .main-layout {
                flex-direction: row; /* 가로 배열로 변경 */
                align-items: flex-start;
            }
            .controls-sidebar {
                flex: 0 0 340px; /* 왼쪽 메뉴 영역 너비 고정 */
                position: sticky; /* 스크롤 내려도 왼쪽에 고정 배치 */
                top: 15px;
            }
            .works-grid {
                display: grid; /* 작품 목록을 격자형 레이아웃으로 변경 */
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); /* 화면 넓이에 맞춰 가로 배치 자동 계산 */
                gap: 15px;
            }
            .work-item {
                min-height: 180px; /* 격자 형태일 때 카드 높이 밸런스 유지 */
            }
        }

        @media (max-width: 600px) {
            .page-wrapper { padding: 10px; border: none; }
            h1 { font-size: 1.6rem; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

<div class="page-wrapper">
    <h1>Archive</h1>

    <div class="main-layout">
        <aside class="controls-sidebar">
            
            <div class="card">
                <span class="section-title" id="formTitle">Record a Work</span>
                <input type="hidden" id="workId">
                
                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label>Title *</label>
                        <input type="text" id="title" placeholder="작품 제목">
                    </div>
                    <div class="form-group">
                        <label>Author</label>
                        <input type="text" id="author" placeholder="작가명">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Rating</label>
                        <select id="rating">
                            <option value="">선택 안함</option>
                            <option value="5">★★★★★</option>
                            <option value="4">★★★★</option>
                            <option value="3">★★★</option>
                            <option value="2">★★</option>
                            <option value="1">★</option>
                        </select>
                    </div>
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="favorite">
                        <label for="favorite" style="margin:0;">Favorite</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Source Link</label>
                    <input type="text" id="link" placeholder="URL 주소">
                </div>

                <div class="form-group">
                    <label>Short Comment</label>
                    <input type="text" id="review_short" placeholder="한 줄 감상">
                </div>

                <div class="form-group">
                    <label>Detailed Review</label>
                    <textarea id="review_long" rows="3" placeholder="상세 기록..."></textarea>
                </div>

                <div class="form-group">
                    <label>Tags</label>
                    <input type="text" id="tags" placeholder="쉼표(,) 구분">
                </div>

                <div class="btn-group">
                    <button id="saveBtn" onclick="saveWork()">Save</button>
                    <button id="cancelBtn" class="btn-outline" style="display:none;" onclick="resetForm()">Cancel</button>
                </div>
            </div>

            <div class="card">
                <span class="section-title">Filter Box</span>
                <div class="form-group">
                    <input type="text" id="searchTitle" placeholder="제목 검색..." onkeyup="renderWorks()">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Include Tags</label>
                        <input type="text" id="includeTags" placeholder="포함할 태그" onkeyup="renderWorks()">
                    </div>
                    <div class="form-group">
                        <label>Exclude Tags</label>
                        <input type="text" id="excludeTags" placeholder="제외할 태그" onkeyup="renderWorks()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <select id="filterFav" onchange="renderWorks()">
                            <option value="all">View All</option>
                            <option value="fav">★ Favorites</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <select id="sortOrder" onchange="renderWorks()">
                            <option value="recent">Latest</option>
                            <option value="ratingHigh">Top Rated</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card backup-zone">
                <button class="btn-outline" onclick="exportJSON()">Export</button>
                <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importJSON(event)">
                <button class="btn-outline" onclick="document.getElementById('importFile').click()">Import</button>
            </div>
        </aside>

        <main class="works-container">
            <div id="worksList" class="works-grid"></div>
        </main>
    </div>
</div>

<script>
    // 본인의 Supabase 정보 입력
    const SUPABASE_URL = 'https://wvstpuunhdlsqfufxymw.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_oUAh6VeN-WC--oG8TZzHqg_2PYDGajA';
    
    let supabase;
    try {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    } catch (e) {
        alert('Supabase 초기화 실패! 상단 CDN 링크를 확인하세요: ' + e.message);
    }

    let allWorks = [];

    async function fetchWorks() {
        try {
            if (!supabase) return;
            const { data, error } = await supabase.from('works').select('*');
            if (error) {
                alert('데이터 로드 에러:\n' + JSON.stringify(error, null, 2));
                return;
            }
            allWorks = data || [];
            renderWorks();
        } catch (e) {
            alert('fetchWorks 함수 실행 에러:\n' + e.message);
        }
    }

    function parseTags(str) {
        if (!str) return [];
        return str.split(',').map(t => t.trim()).filter(t => t.length > 0);
    }

    async function saveWork() {
        try {
            const id = document.getElementById('workId').value;
            const title = document.getElementById('title').value.trim();
            const author = document.getElementById('author').value.trim() || null;
            const link = document.getElementById('link').value.trim() || null;
            const review_short = document.getElementById('review_short').value.trim() || null;
            const review_long = document.getElementById('review_long').value.trim() || null;
            const ratingVal = document.getElementById('rating').value;
            const rating = ratingVal ? parseInt(ratingVal, 10) : null;
            const favorite = document.getElementById('favorite').checked;
            const tags = parseTags(document.getElementById('tags').value);

            if (!title) return alert('제목은 필수입니다.');

            const payload = { title, author, link, review_short, review_long, rating, favorite, tags };

            if (!supabase) {
                alert('Supabase 연결 객체가 없습니다.');
                return;
            }

            let error;
            if (id) {
                const res = await supabase.from('works').update(payload).eq('id', id);
                error = res.error;
            } else {
                const res = await supabase.from('works').insert([payload]);
                error = res.error;
            }

            if (error) {
                alert('Supabase 저장 실패 에러 내용:\n' + JSON.stringify(error, null, 2));
            } else {
                alert('🎉 성공적으로 저장되었습니다!');
                resetForm();
                fetchWorks();
            }
        } catch (e) {
            // 여기가 핵심! 먹통이 되던 원인을 팝업으로 강제 출력합니다.
            alert('자바스크립트 실행 중 치명적 에러 발생:\n' + e.message);
        }
    }

    function editWork(id) {
        const item = allWorks.find(w => w.id == id);
        if (!item) return;

        document.getElementById('workId').value = item.id;
        document.getElementById('title').value = item.title;
        document.getElementById('author').value = item.author || '';
        document.getElementById('link').value = item.link || '';
        document.getElementById('review_short').value = item.review_short || '';
        document.getElementById('review_long').value = item.review_long || '';
        document.getElementById('rating').value = item.rating || '';
        document.getElementById('favorite').checked = !!item.favorite;
        document.getElementById('tags').value = (item.tags || []).join(', ');

        document.getElementById('formTitle').innerText = 'Edit Record';
        document.getElementById('saveBtn').innerText = 'Update';
        document.getElementById('cancelBtn').style.display = 'inline-block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
        document.getElementById('workId').value = '';
        document.getElementById('title').value = '';
        document.getElementById('author').value = '';
        document.getElementById('link').value = '';
        document.getElementById('review_short').value = '';
        document.getElementById('review_long').value = '';
        document.getElementById('rating').value = '';
        document.getElementById('favorite').checked = false;
        document.getElementById('tags').value = '';

        document.getElementById('formTitle').innerText = 'Record a Work';
        document.getElementById('saveBtn').innerText = 'Save';
        document.getElementById('cancelBtn').style.display = 'none';
    }

    async function deleteWork(id) {
        if (!confirm('삭제하시겠습니까?')) return;
        try {
            const { error } = await supabase.from('works').delete().eq('id', id);
            if (error) alert('삭제 실패:\n' + JSON.stringify(error, null, 2));
            else fetchWorks();
        } catch (e) {
            alert('삭제 중 에러 발생:\n' + e.message);
        }
    }

    function renderWorks() {
        const searchTitle = document.getElementById('searchTitle').value.toLowerCase();
        const includeTags = parseTags(document.getElementById('includeTags').value.toLowerCase());
        const excludeTags = parseTags(document.getElementById('excludeTags').value.toLowerCase());
        const filterFav = document.getElementById('filterFav').value;
        const sortOrder = document.getElementById('sortOrder').value;

        let filtered = allWorks.filter(item => {
            if (searchTitle && !item.title.toLowerCase().includes(searchTitle)) return false;
            if (filterFav === 'fav' && !item.favorite) return false;

            const itemTags = (item.tags || []).map(t => t.toLowerCase());
            if (includeTags.length > 0 && !includeTags.every(t => itemTags.includes(t))) return false;
            if (excludeTags.length > 0 && excludeTags.some(t => itemTags.includes(t))) return false;

            return true;
        });

        if (sortOrder === 'recent') {
            filtered.sort((a, b) => b.id - a.id);
        } else if (sortOrder === 'ratingHigh') {
            filtered.sort((a, b) => (b.rating || 0) - (a.rating || 0));
        }

        const listContainer = document.getElementById('worksList');
        listContainer.innerHTML = '';

        if (filtered.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; color:var(--border-light); padding:40px; font-style:italic; grid-column: 1/-1;">No records found.</p>';
            return;
        }

        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'work-item';

            const stars = item.rating ? '★'.repeat(item.rating) : 'Unrated';
            const favBadge = item.favorite ? '<span class="fav-star">FAVORITE</span>' : '';
            const tagsHtml = (item.tags || []).map(t => `<span>${t}</span>`).join('');
            
            let reviewHtml = '';
            if (item.review_short || item.review_long) {
                reviewHtml = `<div class="review-box">`;
                if(item.review_short) reviewHtml += `<div class="review-short">"${item.review_short}"</div>`;
                if(item.review_long) reviewHtml += `<div class="review-long">${item.review_long}</div>`;
                reviewHtml += `</div>`;
            }

            let linkHtml = item.link ? `<a class="work-link" href="${item.link}" target="_blank" rel="noopener">Source Link ↗</a>` : '';
            let authorHtml = item.author ? `<div class="work-author">by ${item.author}</div>` : '';

            div.innerHTML = `
                <div>
                    <div class="work-header">
                        <div>
                            <h3 class="work-title">${item.title}</h3>
                            ${authorHtml}
                        </div>
                        <div class="rating-fav">
                            ${favBadge}
                            <div class="rating-display">${stars}</div>
                        </div>
                    </div>
                    ${reviewHtml}
                    ${linkHtml}
                    <div class="tags">${tagsHtml}</div>
                </div>
                <div class="item-actions">
                    <button class="btn-outline" onclick="editWork('${item.id}')">Edit</button>
                    <button class="btn-danger" onclick="deleteWork('${item.id}')">Delete</button>
                </div>
            `;
            listContainer.appendChild(div);
        });
    }

    function exportJSON() {
        if (allWorks.length === 0) return alert('백업할 데이터가 없습니다.');
        const cleanData = allWorks.map(({ id, created_at, ...pureFields }) => pureFields);
        const blob = new Blob([JSON.stringify(cleanData, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `archive_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const parsed = JSON.parse(e.target.result);
                if (!Array.isArray(parsed)) throw new Error();
                if (!confirm(`${parsed.length}개의 데이터를 추가할까요?`)) { event.target.value = ''; return; }

                const { error } = await supabase.from('works').insert(parsed);
                if (error) alert('DB 저장 오류:\n' + JSON.stringify(error, null, 2));
                else { alert('완료되었습니다.'); fetchWorks(); }
            } catch (err) { alert('잘못된 파일입니다.'); }
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    // 초기 실행
    fetchWorks();
</script>
